descrizione: >-
  Questa sera, dalle ore 20.30, in Piazza Berlinguer, si terrà il comizio della
  lista numero due, Portico in Comune, con il candidato sindaco Cosimo
  Cristillo.

  Riaccenderemo le luci su Piazza Berlinguer: un luogo chiuso e abbandonato che
  vogliamo restituire alla comunità.

  Interverranno i candidati al consiglio comunale Antonio Massaro, Giovanni
  Iodice e Lisa Merola.

  Ti aspettiamo!

  PORTICO in COMUNE

  COSIMO CRISTILLO SINDACO

  FACCIAMO FUNZIONARE LE COSE
